specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Department of the Interior
providerId: department-of-the-interior
publisherName: U.S. Department of the Interior
serviceCategory: Federal Government / Public Open Data
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Federal Government
  - Public Lands
  - Open Data
  - Geospatial
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Department of the Interior public APIs: zero-cost public data services,
  funded through congressional appropriations rather than per-call billing. FinOps practice for consumers
  centers on operational cost (egress, caching, downstream storage) rather than provider invoice cost.'
sources:
  - https://www.doi.gov/developer
  - https://api.data.gov/
principles:
  - name: Visibility
    description: Track DOI / USGS / NPS API consumption locally (consumer-side observability) since DOI
      issues no usage statements. For api.data.gov-keyed APIs (NPS), monitor X-RateLimit-Remaining headers
      and the api.data.gov developer-account dashboard.
  - name: Allocation
    description: Allocate cost on the consumer side - egress fees, downstream storage, and compute spent
      processing federal open data - to the consuming workload. There are no provider charges to allocate.
  - name: Optimization
    description: Cache federal open data aggressively (datasets are stable or updated on documented cadence),
      use bulk dumps and FDSN event windows over polling, identify your client in User-Agent, and throttle
      to stay well within api.data.gov hourly limits.
  - name: Accountability
    description: Each consuming team owns its own consumer-side cost; data stewards within the consuming
      organization should track which DOI datasets are in use and whether any compliance, attribution,
      or update-cadence obligations apply.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Workload Optimization
      - Rate Optimization
      - Architecting for Cloud
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Education and Enablement
      - Onboarding Workloads
billingModel:
  pricingCategory: Free / Public Data
  billingFrequency: N/A
  billingCurrency: USD
  chargeCategories:
    - Usage
  chargeFrequency: N/A
focusColumns:
  ServiceName: DOI Public APIs
  ServiceCategory: Federal Government / Public Open Data
  ProviderName: U.S. Department of the Interior
  PublisherName: U.S. Department of the Interior
  InvoiceIssuerName: N/A (no invoice issued)
  PricingCategory: Free
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Public API requests (consumer-side count)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - bureau
      - consumer
  - name: data_egress
    description: Bytes downloaded from DOI / USGS / NPS endpoints (consumer-side metric)
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - bureau
