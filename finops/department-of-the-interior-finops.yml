unitEconomics:
  - name: Consumer Cost per 1K Requests
    metric: consumer_side_cost / (api_requests / 1000)
    target: trend down via caching
  - name: Cache-Hit Ratio
    metric: cache_hits / (cache_hits + origin_requests)
    target: '> 0.8 for stable datasets'
