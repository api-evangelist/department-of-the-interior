naftiko: 1.0.0-alpha2
info:
  label: National Park Service (NPS) Data API — Parks
  description: 'National Park Service (NPS) Data API — Parks. 1 operations. Lead operation: List or search national parks.
    Self-contained Naftiko capability covering one Department Of The Interior business surface.'
  tags:
  - Department Of The Interior
  - Parks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_THE_INTERIOR_API_KEY: DEPARTMENT_OF_THE_INTERIOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: nps-data-parks
    baseUri: https://developer.nps.gov/api/v1
    description: National Park Service (NPS) Data API — Parks business capability. Self-contained, no shared references.
    resources:
    - name: parks
      path: /parks
      operations:
      - name: listparks
        method: GET
        description: List or search national parks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api_key
      value: '{{env.DEPARTMENT_OF_THE_INTERIOR_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: nps-data-parks-rest
    port: 8080
    description: REST adapter for National Park Service (NPS) Data API — Parks. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/parks
      name: parks
      description: REST surface for parks.
      operations:
      - method: GET
        name: listparks
        description: List or search national parks
        call: nps-data-parks.listparks
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nps-data-parks-mcp
    port: 9090
    transport: http
    description: MCP adapter for National Park Service (NPS) Data API — Parks. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-search-national-parks
      description: List or search national parks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nps-data-parks.listparks
      outputParameters:
      - type: object
        mapping: $.
