naftiko: 1.0.0-alpha2
info:
  label: USGS Earthquake Hazards Program API — Events
  description: 'USGS Earthquake Hazards Program API — Events. 1 operations. Lead operation: Query earthquake events. Self-contained
    Naftiko capability covering one Department Of The Interior business surface.'
  tags:
  - Department Of The Interior
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_THE_INTERIOR_API_KEY: DEPARTMENT_OF_THE_INTERIOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: usgs-earthquake-events
    baseUri: https://earthquake.usgs.gov/fdsnws/event/1
    description: USGS Earthquake Hazards Program API — Events business capability. Self-contained, no shared references.
    resources:
    - name: query
      path: /query
      operations:
      - name: queryevents
        method: GET
        description: Query earthquake events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
        - name: starttime
          in: query
          type: string
        - name: endtime
          in: query
          type: string
        - name: minlatitude
          in: query
          type: number
        - name: maxlatitude
          in: query
          type: number
        - name: minlongitude
          in: query
          type: number
        - name: maxlongitude
          in: query
          type: number
        - name: minmagnitude
          in: query
          type: number
        - name: maxmagnitude
          in: query
          type: number
        - name: orderby
          in: query
          type: string
        - name: limit
          in: query
          type: integer
  exposes:
  - type: rest
    namespace: usgs-earthquake-events-rest
    port: 8080
    description: REST adapter for USGS Earthquake Hazards Program API — Events. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/query
      name: query
      description: REST surface for query.
      operations:
      - method: GET
        name: queryevents
        description: Query earthquake events
        call: usgs-earthquake-events.queryevents
        with:
          format: rest.format
          starttime: rest.starttime
          endtime: rest.endtime
          minlatitude: rest.minlatitude
          maxlatitude: rest.maxlatitude
          minlongitude: rest.minlongitude
          maxlongitude: rest.maxlongitude
          minmagnitude: rest.minmagnitude
          maxmagnitude: rest.maxmagnitude
          orderby: rest.orderby
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: usgs-earthquake-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for USGS Earthquake Hazards Program API — Events. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: query-earthquake-events
      description: Query earthquake events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: usgs-earthquake-events.queryevents
      with:
        format: tools.format
        starttime: tools.starttime
        endtime: tools.endtime
        minlatitude: tools.minlatitude
        maxlatitude: tools.maxlatitude
        minlongitude: tools.minlongitude
        maxlongitude: tools.maxlongitude
        minmagnitude: tools.minmagnitude
        maxmagnitude: tools.maxmagnitude
        orderby: tools.orderby
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
