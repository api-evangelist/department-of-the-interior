naftiko: 1.0.0-alpha2
info:
  label: National Park Service (NPS) Data API — Articles
  description: 'National Park Service (NPS) Data API — Articles. 1 operations. Lead operation: List articles. Self-contained
    Naftiko capability covering one Department Of The Interior business surface.'
  tags:
  - Department Of The Interior
  - Articles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_THE_INTERIOR_API_KEY: DEPARTMENT_OF_THE_INTERIOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: nps-data-articles
    baseUri: https://developer.nps.gov/api/v1
    description: National Park Service (NPS) Data API — Articles business capability. Self-contained, no shared references.
    resources:
    - name: articles
      path: /articles
      operations:
      - name: listarticles
        method: GET
        description: List articles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api_key
      value: '{{env.DEPARTMENT_OF_THE_INTERIOR_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: nps-data-articles-rest
    port: 8080
    description: REST adapter for National Park Service (NPS) Data API — Articles. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/articles
      name: articles
      description: REST surface for articles.
      operations:
      - method: GET
        name: listarticles
        description: List articles
        call: nps-data-articles.listarticles
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nps-data-articles-mcp
    port: 9090
    transport: http
    description: MCP adapter for National Park Service (NPS) Data API — Articles. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-articles
      description: List articles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nps-data-articles.listarticles
      outputParameters:
      - type: object
        mapping: $.
