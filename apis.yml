description: >-
  The Department of the Interior is a government agency in the United States responsible
  for managing the nation's natural resources and cultural heritage. It oversees federal
  lands, including national parks, wildlife refuges, and public lands, and works to
  protect and conserve these areas for current and future generations. The department
  is also in charge of managing the country's energy resources, such as oil, gas,
  and coal, and ensuring that they are developed responsibly and sustainably.
