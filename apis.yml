aid: department-of-the-interior
name: Department of the Interior
description: >-
  The U.S. Department of the Interior manages federal lands, water, wildlife, energy and mineral resources, and trust
  responsibilities to American Indian, Alaska Native, and insular communities. Interior bureaus - National Park Service,
  U.S. Geological Survey, Bureau of Land Management, U.S. Fish and Wildlife Service, Bureau of Reclamation, Bureau of
  Indian Affairs, and the Office of Natural Resources Revenue - publish a number of public APIs and open-data portals.
url: https://raw.githubusercontent.com/api-evangelist/department-of-the-interior/main/apis.yml
