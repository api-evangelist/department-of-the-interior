specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Department of the Interior
providerId: department-of-the-interior
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Federal Government
  - Public Lands
  - Natural Resources
  - Geospatial
  - Open Data
description: All Department of the Interior public APIs (NPS Data, USGS Earthquake, USGS Water Services,
  DOI Open Data, BLM, USFWS ECOS, Bureau of Reclamation, ONRR) are free of charge and operated as public
  data services. Some are gated by an api.data.gov developer key (e.g. NPS Data API); the rest are open
  endpoints subject to fair-use throttling. There is no paid tier, no billing relationship, and no commercial
  contract for use of these APIs.
sources:
  - https://www.doi.gov/developer
  - https://www.nps.gov/subjects/developer/index.htm
  - https://api.data.gov/
  - https://earthquake.usgs.gov/fdsnws/event/1/
  - https://waterservices.usgs.gov/
plans:
  - id: department-of-the-interior-public-free
    name: Public Free
    type: freemium
    description: Free public access. NPS Data API requires a free api.data.gov key (default 1,000 requests
      per hour); USGS, BLM, USFWS, Reclamation, and ONRR data services are open and rate-limited under
      fair-use rather than per-key quotas.
    entries:
      - label: NPS API Requests (api.data.gov keyed)
        description: Free, requires an api.data.gov key. Default 1,000 requests per hour per key; raise
          via api.data.gov support.
        name: nps_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: hour
        geo: US
        domains:
          - https://developer.nps.gov/api/v1
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: USGS / Reclamation / BLM Open Endpoints
        description: Free unauthenticated access subject to fair-use; no per-key quota.
        name: open_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: US
        domains:
          - https://earthquake.usgs.gov/fdsnws/event/1
          - https://waterservices.usgs.gov/nwis
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Open Data License (public-domain federal data)
      - name: National Park Service Data API
      - name: USGS Earthquake Hazards Program API
      - name: USGS Water Services API
      - name: DOI Open Data Catalog
      - name: BLM Public Lands Data
      - name: USFWS Environmental Conservation Online System (ECOS) API
      - name: Bureau of Reclamation Water Data
      - name: ONRR Natural Resources Revenue Data
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
